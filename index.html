<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
        .attribution {
            text-align: center;
            font-size: 11px;
        }

        .attribution a {
            color: hsl(228, 45%, 44%);
        }

        body {
            margin: 0;
            background-color: hsl(0, 0%, 8%);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card{
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: hsl(0, 0%, 12%);
            color: white;
            border-radius: 15px;
            padding: 20px;
        }

        img{
            border-radius: 50%;
            width : 50%;
        }
        .card__social-links{
            display: flex;
            flex-direction: column;
            gap: 10px; 
        }
    </style>
</head>

<body>

    <main class="container">
        <div class="card">
            <div class="card__image">
                <img src="./images/avatar-jessica.jpeg" alt="Profile picture of Jessica Randall">
            </div>
            <div class="card__content">
                <h1 class="card__name">Jessica Randall</h1>
                <p class="card__location">London, United Kingdom</p>
                <p class="card__description">Front-end developer and avid reader.</p>
                <div class="card__social-links">
                    <button class="card__social-link">GitHub</button>
                    <button href="#" class="card__social-link">Frontend Mentor</button>
                    <button href="#" class="card__social-link">LinkedIn</button>
                    <button href="#" class="card__social-link">Twitter</button>
                    <button href="#" class="card__social-link">Instagram</button>
                </div>
            </div>

    </main>

</body>

</html>
